name: Wiki Curator

on:
  push:
    paths:
      - "papers/raw/**"
      - "notes/links.md"
      - "notes/weekly-updates/**"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit wiki updates back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pymupdf

      - name: Run curator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python curator.py

      - name: Commit wiki updates
        run: |
          git config user.name "wiki-curator[bot]"
          git config user.email "wiki-curator@users.noreply.github.com"
          git add wiki/ .curator_state.json
          git diff --staged --quiet || git commit -m "bot: update wiki [skip ci]"
          git push
